<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>치즈모아 브랜드 미리보기</title>
    <link rel="icon" href="../assets/brand/cheesemoa-mark.svg" />
    <link rel="stylesheet" href="preview.css" />
  </head>
  <body>
    <main>
      <header>
        <span class="edition">CHEESEMOA · BRAND DIRECTION 01</span>
        <span class="status"><i></i>Clean-room local viewer</span>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <p class="kicker">GATHER STREAMS. WATCH YOUR WAY.</p>
          <h1>보고 싶은 방송,<br /><em>한곳에.</em></h1>
          <p class="summary">별도 계정도, 외부 멀티뷰 서버도 없이<br />브라우저 안에서 가볍게 모아보는 로컬 멀티뷰.</p>
          <div class="name-card">
            <img src="../assets/brand/cheesemoa-mark.svg" alt="" />
            <span><strong>치즈모아</strong><small>CHEESEMOA · LOCAL MULTIVIEW</small></span>
          </div>
        </div>

        <div class="mark-stage">
          <div class="cheese-ring ring-a"></div>
          <div class="cheese-ring ring-b"></div>
          <span class="crumb crumb-a"></span><span class="crumb crumb-b"></span>
          <img src="../assets/brand/cheesemoa-mark.svg" alt="치즈모아 로고" />
          <span class="label label-a">모아보기</span>
          <span class="label label-b">로컬 실행</span>
          <span class="label label-c">집중 보기</span>
        </div>
      </section>

      <section class="system">
        <article class="logo-card">
          <span class="card-index">01 / LOGO SYSTEM</span>
          <img src="../assets/brand/cheesemoa-lockup.svg" alt="치즈모아 워드마크" />
        </article>
        <article class="icon-card">
          <span class="card-index">02 / APP ICON</span>
          <div class="icon-sizes">
            <img class="icon-large" src="../assets/brand/cheesemoa-mark.svg" alt="" />
            <img class="icon-small" src="../assets/brand/cheesemoa-mark.svg" alt="" />
          </div>
        </article>
        <article class="palette-card">
          <span class="card-index">03 / CHEESE PALETTE</span>
          <div class="swatches">
            <span class="navy">NAVY</span><span class="cheese">CHEESE</span><span class="coral">CORAL</span><span class="cream">CREAM</span>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
