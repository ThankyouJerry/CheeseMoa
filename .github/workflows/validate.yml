name: Validate extension

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run validate
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: CheeseMoa-extension
          path: |
            dist/CheeseMoa-*.zip
            dist/SHA256SUMS.txt
